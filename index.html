<header class="hero">

        </div>

</div>

</section>

<h2>Tu Pedido</h2>
<button id="closeCart">✕</button>
</div>
<div id="cartItems"></div>
<div class="cart-footer">
<div class="total">$ <span id="total">0</span></div>
<button id="sendOrder">FINALIZAR PEDIDO</button>
</div>
</aside>
